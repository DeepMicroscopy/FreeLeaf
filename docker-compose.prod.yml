# Explicit project name: without it, Compose derives the project name from
# the directory, which is the same directory docker-compose.yml (dev) runs
# from — the two would then share containers/networks/volumes by name and
# silently clobber each other (found by testing: prod recreated dev's
# running postgres/minio containers in place). Never run both without this.
name: freeleaf-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      # Stripped fallbacks; forces explicit configuration via a protected .env file
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    # EXPOSED PORTS REMOVED (No public internet access to DB)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    # No published port: the api container reaches minio over the internal
    # Docker network (MINIO_ENDPOINT below); nothing external needs S3 access.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: apps/api
      dockerfile: Dockerfile.prod # Highly recommended to use a multi-stage production Dockerfile
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: "false" # Hardcoded to false for safety
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      FRONTEND_URL: ${FRONTEND_URL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
      # Only needed for split-subdomain deployments — see .env.prod.example.
      CSRF_COOKIE_DOMAIN: ${CSRF_COOKIE_DOMAIN:-}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
      # Mailgun via django-anymail — set to switch off Mailpit's dev SMTP backend.
      MAILGUN_API_KEY: ${MAILGUN_API_KEY}
      MAILGUN_DOMAIN: ${MAILGUN_DOMAIN}
      ORCID_ENV: ${ORCID_ENV:-production}
      ORCID_CLIENT_ID: ${ORCID_CLIENT_ID}
      ORCID_CLIENT_SECRET: ${ORCID_CLIENT_SECRET}
      ORCID_REDIRECT_URI: ${ORCID_REDIRECT_URI}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      COMPILE_SERVICE_URL: http://compile:8100
    # VOLUMES REMOVED (Code is baked straight into the image)
    ports:
      - "127.0.0.1:8002:8000" # localhost-only debug access; nginx reaches it via the internal network regardless
    command: >
      sh -c "python manage.py migrate --settings=config.settings --noinput &&
             python manage.py collectstatic --settings=config.settings --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  collab:
    build:
      context: apps/collab
    restart: unless-stopped
    # No published port: web's nginx reaches it at collab:1234 internally.

  # Sandbox worker image (Plan.md §7) — never started; spawned per job by
  # `compile`. `docker compose -f docker-compose.prod.yml build texlive`
  # builds/tags it before first use.
  texlive:
    build:
      context: docker/texlive
    image: freeleaf-texlive:latest
    profiles: ["build-only"]

  compile:
    build:
      context: apps/compile
    restart: unless-stopped
    environment:
      COMPILE_JOBS_CONTAINER_DIR: /var/lib/freeleaf/jobs
      # Must be the host path of the bind mount below — see apps/compile/sandbox.py.
      COMPILE_JOBS_HOST_DIR: ${COMPILE_JOBS_HOST_DIR:-${PWD}/.compile-jobs}
    volumes:
      # Docker-in-Docker via the host socket — see docs/decisions/compile-sandbox.md.
      # Plan.md §7 flags this as the accepted dev/interim choice and names
      # gVisor/Firecracker/nsjail as the hardened production path; this repo
      # doesn't implement that swap yet, so production currently inherits
      # the same tradeoff dev does. Revisit before a real multi-tenant deploy.
      - /var/run/docker.sock:/var/run/docker.sock
      - ${COMPILE_JOBS_HOST_DIR:-${PWD}/.compile-jobs}:/var/lib/freeleaf/jobs
    # No published port: internal-only, reached by api.

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.prod
      args:
        # Empty (default) = same-origin: nginx proxies /api under this domain
        # (topology A in .env.prod.example). Set VITE_API_ORIGIN to the api's
        # own absolute origin (e.g. https://freeleaf-api.example.com) for a
        # split-subdomain deployment (topology B). This is baked into the
        # static JS bundle at BUILD time, not read at container startup —
        # changing it requires rebuilding: `docker compose -f
        # docker-compose.prod.yml build web` (or `up -d --build web`), a
        # plain restart won't pick up a new value.
        VITE_API_ORIGIN: ${VITE_API_ORIGIN:-}
    restart: unless-stopped
    ports:
      - "8001:80" # 8001 in this repo's examples so it can run alongside dev's :5173 without clashing; map to :80/:443 for a real deployment
      # No 443 mapping — apps/web/nginx.conf only listens on 80. Terminate
      # TLS in front of this stack (a managed LB, or Caddy/another nginx with
      # your certs proxying to this container's port) rather than here; see
      # README's deployment note.
    depends_on:
      - api
      - collab

volumes:
  postgres-data:
  minio-data: