# Explicit project name: without it, Compose derives the project name from
# the directory, which is the same directory docker-compose.yml (dev) runs
# from — the two would then share containers/networks/volumes by name and
# silently clobber each other (found by testing: prod recreated dev's
# running postgres/minio containers in place). Never run both without this.
name: freeleaf-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      # Stripped fallbacks; forces explicit configuration via a protected .env file
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    # EXPOSED PORTS REMOVED (No public internet access to DB)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    # No published port: the api container reaches minio over the internal
    # Docker network (MINIO_ENDPOINT below); nothing external needs S3 access.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: apps/api
      dockerfile: Dockerfile.prod # Highly recommended to use a multi-stage production Dockerfile
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: "false" # Hardcoded to false for safety
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      FRONTEND_URL: ${FRONTEND_URL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
      # Mailgun via django-anymail — set to switch off Mailpit's dev SMTP backend.
      MAILGUN_API_KEY: ${MAILGUN_API_KEY}
      MAILGUN_DOMAIN: ${MAILGUN_DOMAIN}
      ORCID_ENV: ${ORCID_ENV:-production}
      ORCID_CLIENT_ID: ${ORCID_CLIENT_ID}
      ORCID_CLIENT_SECRET: ${ORCID_CLIENT_SECRET}
      ORCID_REDIRECT_URI: ${ORCID_REDIRECT_URI}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
    # VOLUMES REMOVED (Code is baked straight into the image)
    ports:
      - "127.0.0.1:8002:8000" # localhost-only debug access; nginx reaches it via the internal network regardless
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  collab:
    build:
      context: apps/collab
    restart: unless-stopped
    # No published port: web's nginx reaches it at collab:1234 internally.

  compile:
    build:
      context: apps/compile
    restart: unless-stopped
    # No published port: internal-only, reached by api once Phase 3 wires
    # the compile trigger through (currently a health-only stub).

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.prod
      args:
        VITE_API_ORIGIN: "" # same-origin: nginx proxies /api under this domain
    restart: unless-stopped
    ports:
      - "8001:80" # 8001 in this repo's examples so it can run alongside dev's :5173 without clashing; map to :80/:443 for a real deployment
      # No 443 mapping — apps/web/nginx.conf only listens on 80. Terminate
      # TLS in front of this stack (a managed LB, or Caddy/another nginx with
      # your certs proxying to this container's port) rather than here; see
      # README's deployment note.
    depends_on:
      - api
      - collab

volumes:
  postgres-data:
  minio-data: