<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍃</text></svg>">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ '/' | relative_url }}">🍃 FreeLeaf</a>
    <nav>
      <a href="https://github.com/{{ site.repository }}">GitHub</a>
      <a href="https://github.com/{{ site.repository }}/blob/main/PLAN.md">Roadmap</a>
      <a href="https://github.com/{{ site.repository }}/blob/main/docs/security.md">Security</a>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>
      FreeLeaf is free software, licensed AGPLv3.
      <a href="https://github.com/{{ site.repository }}">Source on GitHub</a>.
    </p>
  </footer>
</body>
</html>
