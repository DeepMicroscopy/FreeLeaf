services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-freeleaf}
      POSTGRES_USER: ${POSTGRES_USER:-freeleaf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-freeleaf}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-freeleaf}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-freeleaf}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-freeleafsecret}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025" # web UI
      - "1025:1025" # SMTP

  api:
    build:
      context: apps/api
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-only-not-secret}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      POSTGRES_DB: ${POSTGRES_DB:-freeleaf}
      POSTGRES_USER: ${POSTGRES_USER:-freeleaf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-freeleaf}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    volumes:
      - ./apps/api:/app
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    depends_on:
      postgres:
        condition: service_healthy

  collab:
    build:
      context: apps/collab
    ports:
      - "1234:1234"

  compile:
    build:
      context: apps/compile
    ports:
      - "8100:8100"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    volumes:
      - ./apps/web:/repo/apps/web
      - /repo/apps/web/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres-data:
  minio-data:
