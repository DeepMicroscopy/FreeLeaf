services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-freeleaf}
      POSTGRES_USER: ${POSTGRES_USER:-freeleaf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-freeleaf}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-freeleaf}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-freeleaf}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-freeleafsecret}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025" # web UI
      - "1025:1025" # SMTP

  api:
    build:
      context: apps/api
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-only-not-secret}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
      # "api" (the Docker-network hostname) is needed too — collab calls back
      # into api's internal endpoints using it, not localhost/127.0.0.1.
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,api}
      POSTGRES_DB: ${POSTGRES_DB:-freeleaf}
      POSTGRES_USER: ${POSTGRES_USER:-freeleaf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-freeleaf}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      EMAIL_HOST: mailpit
      EMAIL_PORT: 1025
      # ORCID sandbox app credentials (Plan.md §9 Phase 1) — leave blank to
      # develop the other two sign-in paths; ORCID sign-in 400s until set.
      ORCID_ENV: ${ORCID_ENV:-sandbox}
      ORCID_CLIENT_ID: ${ORCID_CLIENT_ID:-}
      ORCID_CLIENT_SECRET: ${ORCID_CLIENT_SECRET:-}
      ORCID_REDIRECT_URI: ${ORCID_REDIRECT_URI:-http://localhost:8000/api/auth/orcid/callback}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-freeleaf}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-freeleafsecret}
      MINIO_BUCKET: ${MINIO_BUCKET:-freeleaf}
      COMPILE_SERVICE_URL: http://compile:8100
      # Real-time collab (Phase 5, PLAN.md §6) — must match collab's own
      # COLLAB_SHARED_SECRET below. COLLAB_WS_URL is what's handed to the
      # *browser*, so it's the host-reachable address, not the Docker
      # network one.
      COLLAB_SHARED_SECRET: ${COLLAB_SHARED_SECRET:-dev-insecure-collab-secret}
      COLLAB_WS_URL: ${COLLAB_WS_URL:-ws://localhost:1234}
    volumes:
      - ./apps/api:/app
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
      minio:
        condition: service_healthy

  collab:
    build:
      context: apps/collab
    environment:
      COLLAB_SHARED_SECRET: ${COLLAB_SHARED_SECRET:-dev-insecure-collab-secret}
      API_INTERNAL_URL: http://api:8000
    ports:
      - "1234:1234"
    depends_on:
      - api

  # Sandbox worker image (Plan.md §7) — never started as a service; spawned
  # per compile job by `compile` via the Docker Engine API. This entry only
  # exists so `docker compose build texlive` builds/tags it.
  texlive:
    build:
      context: docker/texlive
    image: freeleaf-texlive:latest
    profiles: ["build-only"]

  compile:
    build:
      context: apps/compile
    environment:
      PORT: 8100
      COMPILE_JOBS_CONTAINER_DIR: /var/lib/freeleaf/jobs
      # Must be the *host* path of the bind mount below (not visible from
      # inside this container) — the host Docker daemon needs it to mount
      # job files into the sibling sandbox containers. See sandbox.py.
      COMPILE_JOBS_HOST_DIR: ${PWD}/.compile-jobs
    volumes:
      # Talks to the host's Docker daemon to spawn ephemeral sandbox
      # containers — see apps/compile/Dockerfile for why this service (and
      # only this one) runs as root, and docs/decisions/compile-sandbox.md
      # for the dev-vs-prod tradeoff this implies.
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PWD}/.compile-jobs:/var/lib/freeleaf/jobs
    ports:
      - "8100:8100"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_API_ORIGIN: ${VITE_API_ORIGIN:-http://localhost:8000}
    volumes:
      - ./apps/web:/repo/apps/web
      - /repo/apps/web/node_modules
      # packages/shared has real runtime code too (not just types), not only
      # the generated OpenAPI client — bind-mount it too so dev edits there
      # are live, same as apps/web. Without this it's frozen at image-build
      # time (this bit Phase 6's bibtex.ts: a real runtime export, unlike
      # earlier phases' generated.ts changes which are type-only and erased
      # at build time, so the gap never showed up before).
      - ./packages/shared:/repo/packages/shared
      - /repo/packages/shared/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres-data:
  minio-data:
