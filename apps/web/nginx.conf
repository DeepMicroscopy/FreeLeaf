# Production reverse-proxy config (see apps/web/Dockerfile.prod).
# Serves the built SPA and proxies /api, /admin, /static, /collab to their
# services by Docker Compose network name — this keeps everything same-origin
# in production, which sidesteps the CORS/cross-site-cookie fragility that
# dev's separate localhost:5173 + localhost:8000 origins have (see Status.md).
#
# proxy_pass targets use variables + this resolver instead of bare hostnames:
# nginx resolves a bare hostname in proxy_pass once at config load, so if
# "api"/"collab" aren't up yet (fresh stack, rolling restart) nginx fails to
# start entirely. 127.0.0.11 is Docker's embedded DNS — resolving per-request
# instead means nginx starts regardless of upstream ordering and picks up
# container restarts/IP changes without needing an nginx reload.
resolver 127.0.0.11 valid=10s;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 20m;

    location /api/ {
        set $upstream_api api:8000;
        proxy_pass http://$upstream_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        set $upstream_api api:8000;
        proxy_pass http://$upstream_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django admin's own static assets (whitenoise serves these from the api
    # container — the app's own UI is a separately-built SPA, not Django
    # templates, so this is admin-only traffic).
    location /static/ {
        set $upstream_api api:8000;
        proxy_pass http://$upstream_api;
        proxy_set_header Host $host;
    }

    # Yjs collab sync (Phase 5) — WebSocket upgrade.
    #
    # proxy_pass with a *variable* upstream has a well-known nginx gotcha:
    # if a URI follows the variable (even a bare "/"), nginx treats that
    # literal URI as replacing the request URI *entirely* — path AND query
    # string — rather than stripping just the matched location prefix like
    # it does for a static proxy_pass target. `proxy_pass http://$upstream/;`
    # (the trailing slash is a URI) was forwarding a literal "/" to collab
    # for every request, regardless of the actual room path or ?token=...
    # query string — collab always saw an empty room and no token. The fix:
    # `rewrite` to strip the /collab/ prefix ourselves (so nginx's internal
    # URI becomes just /roomId?token=...), then `proxy_pass` with *no* URI
    # after the variable, which per nginx docs forwards that (rewritten)
    # URI unchanged, query string included.
    location /collab/ {
        set $upstream_collab collab:1234;
        rewrite ^/collab/(.*)$ /$1 break;
        proxy_pass http://$upstream_collab;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # pdfjs-dist's worker ships as a modern .mjs ES module (see PdfViewer.tsx),
    # loaded as `new Worker(url, { type: "module" })`. nginx's default
    # mime.types has no entry for that extension, so it falls back to
    # `default_type` (application/octet-stream) — Chrome enforces strict MIME
    # checking for module scripts and refuses to load it under that type.
    # Safari doesn't enforce this as strictly, which is why the PDF pane only
    # broke in Chrome.
    location ~* \.mjs$ {
        default_type text/javascript;
        try_files $uri =404;
    }

    location / {
        try_files $uri /index.html;
    }
}
